[theme]
base            = "dark"
primaryColor    = "#06B6D4"
backgroundColor = "#0F172A"
secondaryBackgroundColor = "#1E293B"
textColor       = "#E2E8F0"

[server]
# Streamlit Cloud sets these automatically — only needed for local dev
headless        = true
enableCORS      = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
